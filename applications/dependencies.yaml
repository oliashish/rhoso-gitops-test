---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-dependencies
  namespace: openshift-gitops
spec:
  project: default
  source:
    # YOUR repo - change this!
    repoURL: https://github.com/oliashish/rhoso-gitops-test.git
    targetRevision: main
    path: dependencies
  destination:
    server: https://kubernetes.default.svc
    namespace: openstack-operators
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
