---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference upstream OLM dependencies (cert-manager, metallb, nmstate, coo)
components:
  - https://github.com/openstack-k8s-operators/architecture/lib/olm-deps?ref=main
  - https://github.com/openstack-k8s-operators/gitops/components/argocd/annotations?ref=main

# Additional CRs to initialize operators (not in upstream olm-deps)
resources:
  - nmstate-cr.yaml
  - metallb-cr.yaml
  - openstack-operator.yaml
  - openstack-cr.yaml
