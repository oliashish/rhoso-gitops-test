---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference upstream components
components:
  # ArgoCD sync-wave annotations
  - https://github.com/openstack-k8s-operators/gitops/components/argocd/annotations?ref=main
  # Only the OpenStackControlPlane (not the 3-node networking)
  - https://github.com/openstack-k8s-operators/gitops/components/rhoso/controlplane/controlplane?ref=main

# CRC-specific networking (single node, different from upstream 3-node setup)
resources:
  - crc-nncp.yaml
  - crc-netconfig.yaml
  - crc-net-attach-def.yaml
  - crc-metallb.yaml

# Patches to adapt upstream OpenStackControlPlane for CRC
patches:
  - path: patch-controlplane.yaml
